spring.application.name=budget-tracker

# Datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:55432/budget_tracker
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migration configuration
# baseline-on-migrate adopts an existing schema on first run without re-executing V1
spring.flyway.baseline-on-migrate=true

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Security flag
app.security.enabled=true

# Registration (disable in production, enable for testing/debugging)
app.auth.register-enabled=false

# CORS Configuration (uncomment and set origins if you need cross-origin API access)
# app.cors.allowed-origins=http://localhost:55173,http://localhost:3300

# Data Seeder
app.data-seeder.enabled=false

# JWT Configuration
# In production, app.security.jwt.secret should be a long base64 string
app.security.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.security.jwt.expiration-ms=86400000

# Backup Configuration
app.backup.directory=backups