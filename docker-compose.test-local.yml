services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-tracker-postgres-local
    environment:
      POSTGRES_DB: budget_tracker
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

volumes:
  postgres_data_local: